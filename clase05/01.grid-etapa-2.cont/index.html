<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Etapa 1</title>
  </head>
  <body>

    <h1>Grid Etapa 1</h1>

    <!-- Grid es un sistema de diseño bidimensional en CSS que permite crear diseños complejos y estructurados en una pagina web. Es una forma mucho mas poderosa de controlar la ubicacion y el diseño de los elementos HTML en una cuadricula. A diferencia de Flexbox. Sistema unidimensional. CSS Grid ofrece una mayor flexiblidad y control sobre los elementos dentro de un documento html.-->

    <!-- .contenedor>.elemento.elm${$}*24 -->
    <div class="contenedor">
      <div class="elemento elm1">1</div>
      <div class="elemento elm2">2</div>
      <div class="elemento elm3">3</div>
      <div class="elemento elm4">4</div>
      <div class="elemento elm5">5</div>
      <div class="elemento elm6">6</div>
      <div class="elemento elm7">7</div>
      <div class="elemento elm8">8</div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
